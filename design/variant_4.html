<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Ethereal Forest - Organic Release</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "forest-deep": "#081C15",
                        "forest-moss": "#2D4A3E",
                        "forest-leaf": "#40916C",
                        "seafoam-pale": "#D8F3DC",
                        "seafoam-dim": "#95D5B2",
                    },
                    fontFamily: {
                        "serif": ["Crimson Text", "serif"],
                        "display": ["Crimson Text", "serif"] 
                    },
                    animation: {
                        'blink': 'blink 1.5s infinite ease-in-out',
                        'pulse-slow': 'pulse 5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'drift-leaf-1': 'driftLeaf1 25s infinite alternate ease-in-out',
                        'drift-leaf-2': 'driftLeaf2 30s infinite alternate ease-in-out',
                        'drift-leaf-3': 'driftLeaf3 22s infinite alternate ease-in-out',
                        'fade-out-slow': 'fadeOut 8s forwards ease-in',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        blink: {
                            '0%, 100%': { opacity: '0.8', transform: 'scaleY(1)' },
                            '50%': { opacity: '0.2', transform: 'scaleY(0.9)' },
                        },
                        driftLeaf1: {
                            '0%': { transform: 'translate(0, 0) rotate(0deg)' },
                            '100%': { transform: 'translate(50px, 20px) rotate(10deg)' },
                        },
                        driftLeaf2: {
                            '0%': { transform: 'translate(0, 0) rotate(0deg)' },
                            '100%': { transform: 'translate(-40px, -30px) rotate(-5deg)' },
                        },
                        driftLeaf3: {
                            '0%': { transform: 'translate(0, 0) rotate(0deg)' },
                            '100%': { transform: 'translate(30px, -50px) rotate(8deg)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        fadeOut: {
                            '0%': { opacity: '0.8' },
                            '100%': { opacity: '0' },
                        }
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .cursor-blink {
                animation: blink 1s step-end infinite;
            }
            .word-drift {
                animation: fadeOut 10s forwards ease-out;
            }.invisible-input {
                caret-color: transparent;
                color: transparent;
                text-shadow: 0 0 0 transparent; 
            }
            .invisible-input:focus {
                outline: none;
            }.no-scrollbar::-webkit-scrollbar {
                display: none;
            }
            .no-scrollbar {
                -ms-overflow-style: none;scrollbar-width: none;}
        }
    </style>
</head>
<body class="bg-forest-deep text-seafoam-pale font-serif antialiased overflow-hidden h-screen w-screen relative selection:bg-forest-moss/40 selection:text-white cursor-text" onclick="document.getElementById('hidden-input').focus()">
<div class="absolute inset-0 z-0 bg-[radial-gradient(ellipse_at_top,_#1B4332_0%,_#081C15_60%)] opacity-60 pointer-events-none"></div>
<div class="absolute inset-0 z-0 bg-[radial-gradient(circle_at_bottom_right,_#2D4A3E_0%,_transparent_50%)] opacity-30 pointer-events-none"></div>
<div class="absolute top-1/4 left-1/4 w-1.5 h-1.5 bg-seafoam-dim/20 rounded-full blur-[1px] animate-drift-leaf-1 pointer-events-none"></div>
<div class="absolute bottom-1/3 right-1/4 w-1 h-1 bg-seafoam-pale/10 rounded-full blur-[0.5px] animate-drift-leaf-2 pointer-events-none"></div>
<div class="absolute top-2/3 left-1/2 w-2 h-2 bg-forest-leaf/20 rounded-full blur-[2px] animate-drift-leaf-3 pointer-events-none"></div>
<div class="absolute top-1/2 right-10 w-1 h-1 bg-seafoam-dim/30 rounded-full blur-[1px] animate-float pointer-events-none"></div>
<div class="relative z-10 w-full h-full flex flex-col items-center justify-center">
<textarea autofocus="" class="absolute opacity-0 w-1 h-1 -z-10" id="hidden-input"></textarea>
<div class="relative w-full max-w-5xl h-3/4 flex flex-wrap content-center justify-center pointer-events-none" id="typing-area">
<div class="w-0.5 h-8 bg-seafoam-pale/70 shadow-[0_0_8px_rgba(216,243,220,0.4)] animate-blink absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 transition-opacity duration-300 rounded-full" id="central-cursor"></div>
<span class="absolute text-3xl italic text-forest-leaf/20 blur-[1px] top-[35%] left-[30%] animate-[driftLeaf1_18s_infinite_alternate] select-none rotate-[-5deg]">leaves</span>
<span class="absolute text-4xl italic text-forest-moss/30 blur-[2px] top-[60%] right-[35%] animate-[driftLeaf2_25s_infinite_alternate] select-none rotate-[3deg]">drifting</span>
<span class="absolute text-2xl italic text-seafoam-dim/10 blur-[1px] top-[25%] right-[25%] animate-[driftLeaf3_20s_infinite_alternate] select-none rotate-[6deg]">quiet</span>
<span class="absolute text-5xl italic text-forest-leaf/10 blur-[3px] bottom-[30%] left-[40%] animate-[driftLeaf1_30s_infinite_alternate] select-none rotate-[-2deg]">stream</span>
<div class="relative text-3xl md:text-5xl lg:text-6xl font-normal text-seafoam-pale drop-shadow-lg tracking-wide px-8 text-center leading-relaxed">
<span class="opacity-0 transition-opacity duration-1000"></span>
</div>
</div>
<div class="absolute bottom-1/4 pointer-events-none">
<p class="font-serif italic text-xl md:text-2xl text-seafoam-dim animate-pulse-slow tracking-widest opacity-50 drop-shadow-md">
            Let the stream carry it away.
        </p>
</div>
<div class="absolute bottom-10 opacity-40 text-xs tracking-[0.4em] uppercase text-forest-leaf font-semibold pointer-events-none mix-blend-plus-lighter">
        Type to release â¢ Enter to let go
    </div>
</div>
<div class="absolute inset-0 z-20 pointer-events-none bg-[radial-gradient(circle_at_center,transparent_30%,#05110d_100%)] opacity-90"></div>
</body></html>
