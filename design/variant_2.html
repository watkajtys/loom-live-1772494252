<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Bathypelagic Void - Obsidian Warmth Release</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "obsidian": "#0A0908",
                        "warm-cream": "#F5F5DC",
                        "amber-glow": "#B45309",
                        "amber-fade": "#78350f",
                    },
                    fontFamily: {
                        "serif": ["Libre Baskerville", "serif"],
                    },
                    animation: {
                        'blink': 'blink 1.5s infinite',
                        'pulse-slow': 'pulse 5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'sink': 'sink 20s forwards ease-in',
                        'drift-slow': 'drift 30s infinite alternate ease-in-out',
                    },
                    keyframes: {
                        blink: {
                            '0%, 100%': { opacity: '0.8' },
                            '50%': { opacity: '0.2' },
                        },
                        sink: {
                            '0%': { transform: 'translateY(0) scale(1)', opacity: '0.8', filter: 'blur(0px)' },
                            '80%': { color: '#B45309', filter: 'blur(2px)' },
                            '100%': { transform: 'translateY(150px) scale(0.9)', opacity: '0', filter: 'blur(8px)', color: '#78350f' },
                        },
                        drift: {
                            '0%': { transform: 'translateX(-10px)' },
                            '100%': { transform: 'translateX(10px)' },
                        }
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .sepia-glow {
                background: radial-gradient(circle at center, rgba(180, 83, 9, 0.08) 0%, rgba(10, 9, 8, 0) 60%);
            }
        }
    </style>
</head>
<body class="bg-obsidian text-warm-cream font-serif antialiased overflow-hidden h-screen w-screen relative selection:bg-amber-900/30 cursor-text" onclick="document.getElementById('hidden-input').focus()">
<div class="absolute inset-0 z-0 sepia-glow pointer-events-none"></div>
<div class="absolute top-1/3 left-1/4 w-1 h-1 bg-warm-cream/10 rounded-full blur-[0.5px] animate-drift-slow duration-[25s] pointer-events-none"></div>
<div class="absolute bottom-1/3 right-1/3 w-1.5 h-1.5 bg-warm-cream/5 rounded-full blur-[1px] animate-drift-slow duration-[35s] pointer-events-none"></div>
<div class="absolute top-2/3 left-1/2 w-1 h-1 bg-warm-cream/10 rounded-full blur-[0.5px] animate-drift-slow duration-[20s] pointer-events-none"></div>
<div class="relative z-10 w-full h-full flex flex-col items-center justify-center">
<textarea autofocus="" class="absolute opacity-0 w-1 h-1 -z-10" id="hidden-input"></textarea>
<div class="relative w-full max-w-3xl h-2/3 flex flex-col items-center justify-center pointer-events-none space-y-8" id="typing-area">
<div class="w-0.5 h-10 bg-warm-cream/70 shadow-[0_0_8px_rgba(245,245,220,0.3)] animate-blink absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2" id="central-cursor"></div>
<span class="absolute text-3xl italic text-amber-900/20 blur-[1px] top-[35%] left-[20%] animate-[sink_25s_infinite_reverse] select-none font-serif">expectations</span>
<span class="absolute text-2xl italic text-amber-800/20 blur-[2px] bottom-[30%] right-[25%] animate-[sink_30s_infinite_reverse] select-none font-serif">tomorrow</span>
<span class="absolute text-4xl italic text-amber-950/40 blur-[3px] top-[25%] right-[30%] animate-[sink_28s_infinite_reverse] select-none font-serif">unfinished</span>
<div class="relative text-4xl md:text-5xl lg:text-6xl text-warm-cream drop-shadow-sm tracking-wide text-center mix-blend-plus-lighter opacity-90">
</div>
</div>
<div class="absolute bottom-1/4 pointer-events-none text-center px-4">
<p class="font-serif italic text-lg md:text-xl text-amber-700/60 animate-pulse-slow tracking-wider">
                Hold the thought. Let it sink.
            </p>
</div>
<div class="absolute bottom-10 opacity-30 text-xs tracking-[0.25em] uppercase text-amber-800/80 font-serif font-bold pointer-events-none">
            Type to release â¢ Enter to let go
        </div>
</div>
<div class="absolute inset-0 z-20 pointer-events-none bg-[radial-gradient(circle_at_center,transparent_40%,#0A0908_100%)]"></div>

</body></html>
