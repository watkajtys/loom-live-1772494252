<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Bathypelagic Void - Deep Abyss Release</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&amp;family=Cinzel:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "abyss-dark": "#000814",
                        "abyss-teal": "#001a2c",
                        "silver-blue": "#c4dbe0",
                        "glow-blue": "#a4c8d1",
                    },
                    fontFamily: {
                        "serif": ["Playfair Display", "serif"],
                        "cinematic": ["Cinzel", "serif"]
                    },
                    animation: {
                        'blink-glow': 'blinkGlow 2s infinite',
                        'pulse-deep': 'pulseDeep 6s ease-in-out infinite',
                        'drift-slow': 'drift 25s infinite alternate ease-in-out',
                        'shimmer': 'shimmer 10s infinite linear',
                    },
                    keyframes: {
                        blinkGlow: {
                            '0%, 100%': { opacity: '1', boxShadow: '0 0 15px rgba(164, 200, 209, 0.4)' },
                            '50%': { opacity: '0.3', boxShadow: '0 0 5px rgba(164, 200, 209, 0.1)' },
                        },
                        pulseDeep: {
                            '0%, 100%': { opacity: '0.6' },
                            '50%': { opacity: '0.3' },
                        },
                        drift: {
                            '0%': { transform: 'translate(0, 0)' },
                            '100%': { transform: 'translate(10px, -15px)' },
                        },
                         shimmer: {
                            '0%': { backgroundPosition: '-1000px 0' },
                            '100%': { backgroundPosition: '1000px 0' }
                        }
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .text-glow {
                text-shadow: 0 0 20px rgba(164, 200, 209, 0.3), 0 0 10px rgba(164, 200, 209, 0.1);
            }
            .cursor-glow {
                box-shadow: 0 0 10px 2px rgba(196, 219, 224, 0.3);
            }
        }
    </style>
</head>
<body class="bg-abyss-dark text-silver-blue font-serif antialiased overflow-hidden h-screen w-screen relative selection:bg-abyss-teal selection:text-white cursor-text" onclick="document.getElementById('hidden-input').focus()">
<div class="absolute inset-0 z-0 bg-[radial-gradient(circle_at_50%_30%,_#0c2a44_0%,_#000814_60%)] opacity-60 pointer-events-none"></div>
<div class="absolute inset-0 z-0 bg-[radial-gradient(ellipse_at_bottom,_#03182b_0%,_transparent_50%)] opacity-40 pointer-events-none"></div>
<div class="absolute top-1/3 left-1/4 w-96 h-96 bg-abyss-teal/20 rounded-full blur-[100px] animate-pulse-deep pointer-events-none"></div>
<div class="absolute bottom-1/4 right-1/3 w-64 h-64 bg-teal-900/10 rounded-full blur-[80px] animate-drift-slow pointer-events-none"></div>
<div class="relative z-10 w-full h-full flex flex-col items-center justify-center">
<textarea autofocus="" class="absolute opacity-0 w-1 h-1 -z-10" id="hidden-input"></textarea>
<div class="relative w-full max-w-5xl h-3/4 flex flex-col items-center justify-center pointer-events-none" id="typing-area">
<div class="w-0.5 h-12 bg-silver-blue/90 animate-blink-glow absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 transition-opacity duration-300 rounded-full" id="central-cursor"></div>
<span class="absolute text-3xl font-serif italic text-teal-900/20 blur-[1px] top-[20%] left-[20%] animate-drift-slow select-none">release</span>
<span class="absolute text-4xl font-serif italic text-teal-800/10 blur-[2px] bottom-[25%] right-[25%] animate-drift-slow select-none delay-1000">drift</span>
<span class="absolute text-2xl font-serif italic text-teal-700/10 blur-[1px] top-[30%] right-[30%] animate-drift-slow select-none delay-500">silence</span>
<div class="relative text-4xl md:text-5xl lg:text-6xl font-normal text-silver-blue text-glow tracking-wide mix-blend-screen px-8 text-center leading-relaxed opacity-0">
</div>
</div>
<div class="absolute bottom-1/3 transform translate-y-12 pointer-events-none text-center">
<p class="font-serif italic text-2xl md:text-3xl text-silver-blue/50 tracking-wider font-light animate-pulse-deep">
                It is held for you. Now, rest.
            </p>
</div>
<div class="absolute bottom-10 opacity-30 text-xs tracking-[0.4em] uppercase text-glow-blue font-cinematic pointer-events-none">
            Type to release â¢ Enter to submit
        </div>
</div>
<div class="absolute inset-0 z-20 pointer-events-none bg-[radial-gradient(circle_at_center,transparent_0%,_#000814_95%)]"></div>

</body></html>
