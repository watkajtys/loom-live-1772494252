<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Bathypelagic Void - Nebula Mist Release</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;300;400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "nebula-dark": "#1A121F",
                        "nebula-void": "#0e0912",
                        "nebula-fog": "#3c2a4d",
                        "digital-violet": "#e0d4fc",
                    },
                    fontFamily: {
                        "mono": ["'JetBrains Mono'", "monospace"],
                    },
                    animation: {
                        'blink-cursor': 'blink 1s step-end infinite',
                        'pulse-glow': 'pulseGlow 4s ease-in-out infinite',
                        'float': 'float 20s infinite ease-in-out',
                        'float-reverse': 'floatReverse 25s infinite ease-in-out',
                        'mist-drift': 'mistDrift 60s linear infinite',
                    },
                    backgroundImage: {
                        'grain': "url('data:image/svg+xml,%3Csvg viewBox=%220 0 400 400%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22 opacity=%220.05%22/%3E%3C/svg%3E')",
                    },
                    keyframes: {
                        blink: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: '0.4' },
                            '50%': { opacity: '0.7' },
                        },
                        float: {
                            '0%': { transform: 'translate(0, 0)' },
                            '50%': { transform: 'translate(20px, -20px)' },
                            '100%': { transform: 'translate(0, 0)' },
                        },
                        floatReverse: {
                            '0%': { transform: 'translate(0, 0)' },
                            '50%': { transform: 'translate(-15px, 15px)' },
                            '100%': { transform: 'translate(0, 0)' },
                        },
                        mistDrift: {
                            '0%': { backgroundPosition: '0% 50%' },
                            '100%': { backgroundPosition: '100% 50%' },
                        }
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .text-digital {
                text-shadow: 0 0 5px rgba(224, 212, 252, 0.3), 0 0 10px rgba(224, 212, 252, 0.1);
            }
            .fog-layer {
                background: radial-gradient(circle at 50% 50%, rgba(60, 42, 77, 0.15) 0%, transparent 70%);
                mix-blend-mode: screen;
            }
        }
    </style>
</head>
<body class="bg-nebula-dark text-digital-violet font-mono antialiased overflow-hidden h-screen w-screen relative selection:bg-purple-500/30 cursor-text" onclick="document.getElementById('hidden-input').focus()">
<div class="absolute inset-0 z-[1] bg-grain opacity-40 pointer-events-none mix-blend-overlay"></div>
<div class="absolute inset-0 z-0 bg-gradient-to-b from-[#1A121F] via-[#241630] to-[#0e0912]"></div>
<div class="absolute inset-0 z-0 bg-[radial-gradient(circle_at_center,_#3c2a4d33_0%,_transparent_60%)] animate-pulse-glow"></div>
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[60%] bg-purple-900/10 rounded-full blur-[100px] animate-float pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-indigo-900/10 rounded-full blur-[80px] animate-float-reverse pointer-events-none"></div>
<div class="absolute inset-0 z-[2] bg-[linear-gradient(to_right,#80808005_1px,transparent_1px),linear-gradient(to_bottom,#80808005_1px,transparent_1px)] bg-[size:4rem_4rem] mask-image-[radial-gradient(ellipse_60%_60%_at_50%_50%,#000_70%,transparent_100%)] pointer-events-none"></div>
<div class="relative z-10 w-full h-full flex flex-col items-center justify-center">
<textarea autofocus="" class="absolute opacity-0 w-1 h-1 -z-10" id="hidden-input"></textarea>
<div class="relative w-full max-w-5xl h-3/4 flex flex-col items-center justify-center pointer-events-none" id="typing-area">
<div class="w-2.5 h-5 bg-digital-violet/80 shadow-[0_0_8px_rgba(224,212,252,0.6)] animate-blink-cursor absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2" id="central-cursor"></div>
<span class="absolute text-sm font-thin text-purple-300/10 top-[35%] left-[20%] animate-float select-none font-mono tracking-widest">&lt;process:worry&gt;</span>
<span class="absolute text-xs font-thin text-purple-300/10 top-[60%] right-[25%] animate-float-reverse select-none font-mono tracking-widest">/temp_cache/deadline</span>
<span class="absolute text-sm font-thin text-purple-300/10 bottom-[30%] left-[30%] animate-float select-none font-mono tracking-widest">ERROR:noise</span>
<div class="relative text-2xl md:text-3xl lg:text-4xl font-light text-digital-violet/90 text-digital tracking-wide text-center px-8 leading-relaxed">
<span class="opacity-0 transition-opacity duration-1000"></span>
</div>
</div>
<div class="absolute bottom-[20%] pointer-events-none text-center space-y-2">
<p class="font-mono text-xs md:text-sm text-purple-200/50 uppercase tracking-[0.2em]">
                System Status: Ready for Offload
            </p>
<p class="font-mono text-lg md:text-xl text-digital-violet/70 animate-pulse-glow tracking-tight border-l-2 border-digital-violet/30 pl-4 py-1">
                Data transferred to cloud storage. Sleep mode initiated.
            </p>
</div>
<div class="absolute bottom-8 w-full flex justify-between px-12 opacity-30 text-[10px] tracking-[0.15em] uppercase text-purple-300/60 font-mono pointer-events-none">
<span>[INPUT_STREAM: ACTIVE]</span>
<span>PRESS [ENTER] TO UPLOAD</span>
</div>
</div>
<div class="absolute inset-0 z-20 pointer-events-none bg-[radial-gradient(circle_at_center,transparent_40%,#0e0912_100%)]"></div>

</body></html>
